<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #141414, #2b2b2b);

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    padding: 20px;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 380px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 14px;
    text-align: center;

    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* TITLE */
h2 {
    color: #ff9800;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;

    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);

    background: rgba(255,255,255,0.1);
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    background: #ff9800;
    color: black;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

/* LINK */
a {
    display: block;
    margin-top: 15px;
    color: #ff9800;
    text-decoration: none;
}

/* 📱 MOBILE IMPROVEMENT */
@media (max-width: 400px) {
    .card {
        padding: 20px;
    }

    h2 {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>💈 Barber Login</h2>

        <input id="shop" placeholder="Shop Name">
        <input id="pass" type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <a href="signup.html">Create new account</a>
    </div>
</div>

<script>
async function login() {
    const shopName = document.getElementById("shop").value;
    const password = document.getElementById("pass").value;

    const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ shopName, password })
    });

    const data = await res.json();

    if (data.success) {
        localStorage.setItem("shopName", shopName);
        window.location.href = "dashboard.html";
    } else {
        alert("Wrong login");
    }
}
</script>

</body>
</html>
